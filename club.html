<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Club Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: hidden;
}

body {
  font-family: 'Rubik', sans-serif;
  background: transparent;
}

.chat-container {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  background: transparent;
}

.chat-scrollable {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  scroll-behavior: auto;
  padding: 8px 0 8px 0;
  scrollbar-width: thin;
  -ms-overflow-style: auto;
}

.chat-scrollable::-webkit-scrollbar {
  width: 5px;
  background: rgba(0,0,0,0.1);
  border-radius: 3px;
}

.chat-scrollable::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,0.3);
  border-radius: 3px;
}

.row { 
  display: flex; 
  align-items: flex-start; 
  margin: 4px 10px;
  width: calc(100% - 20px);
  max-width: 100%;
}

.avatar { 
  width: 32px; 
  height: 32px; 
  margin-right: 8px; 
  flex-shrink: 0; 
}

.avatar img { 
  width: 100%; 
  height: 100%; 
  object-fit: cover; 
  border-radius: 0; 
}

.message { 
  position: relative; 
  background: #1ea7e1; 
  border-radius: 18px; 
  padding: 8px 14px 10px 14px;
  flex: 1;
  min-width: 0;
  max-width: calc(100% - 40px);
  width: auto;
  box-shadow: inset 0 -2px 0 rgba(0,0,0,0.15);
  word-wrap: break-word;
}

.message::before { 
  content: ""; 
  position: absolute; 
  left: -6px; 
  top: 12px; 
  width: 12px; 
  height: 12px; 
  background: #1ea7e1; 
  transform: rotate(45deg); 
  border-radius: 2px; 
}

.name { 
  font-weight: 700; 
  font-size: 14px; 
  color: #ffffff; 
  margin-bottom: 2px; 
  text-shadow: 0 1px 0 rgba(0,0,0,0.3); 
}

.text { 
  font-size: 14px; 
  font-weight: 600; 
  color: #eaf7ff; 
  word-break: break-word;
  white-space: pre-wrap;
  line-height: 1.35;
}

.time { 
  position: absolute; 
  top: 6px; 
  right: 12px; 
  font-size: 10px; 
  color: rgba(0,0,0,0.35); 
  font-weight: 600; 
}

.empty-chat {
  color: rgba(255,255,255,0.6);
  text-align: center;
  font-size: 14px;
  padding: 20px;
  width: 100%;
  box-sizing: border-box;
  font-weight: 400;
}
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-scrollable" id="chatScroll">
    <div class="empty-chat" id="emptyPlaceholder">Сообщения пока не загружены</div>
  </div>
</div>

<script>
const scrollContainer = document.getElementById('chatScroll');
let autoScrollEnabled = true;
let scrollTimeout = null;

function formatTimeAgo(timestampSeconds) {
  if (!timestampSeconds) return "только что";
  const now = Math.floor(Date.now()  /1000);
  const diffSeconds = now - timestampSeconds;
  if (diffSeconds < 0) return "только что";
  const minutes = Math.floor(diffSeconds / 60);
  const hours = Math.floor(diffSeconds / 3600);
  const days = Math.floor(diffSeconds / 86400);
  if (days >= 1) {
    const remainingHours = hours % 24;
    return `${days} д. ${remainingHours} ч. назад`;
  } else if (hours >= 1) {
    const remainingMins = minutes % 60;
    return `${hours} ч. ${remainingMins} мин. назад`;
  } else if (minutes >= 1) {
    return `${minutes} мин. назад`;
  } else {
    return `только что`;
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getIconUrl(iconName) {
  if (!iconName) {
    return "https://raw.githubusercontent.com/bahrstars/bahrstars.github.io/7078079fb0d951a18723045bb6c0d55c0ccf538c/GameFiles/Images/Icons/GameIcon4.svg";
  }
  const cleanName = String(iconName).replace(/\.svg$/i, '');
  return `https://raw.githubusercontent.com/bahrstars/bahrstars.github.io/5c4d2cff072d93b418887ee2dd8376a51482acdc/GameFiles/Images/Icons/${encodeURIComponent(cleanName)}.svg`;
}

function renderMessages(messagesArray) {
  while (scrollContainer.firstChild) {
    scrollContainer.removeChild(scrollContainer.firstChild);
  }
  
  if (!messagesArray || messagesArray.length === 0) {
    const emptyDiv = document.createElement('div');
    emptyDiv.className = 'empty-chat';
    emptyDiv.textContent = 'Сообщения пока не загружены';
    scrollContainer.appendChild(emptyDiv);
    return;
  }
  
  for (let i = 0; i < messagesArray.length; i++) {
    const msg = messagesArray[i];
    if (!msg || typeof msg !== 'object') continue;
    
    const name = msg.name || 'Аноним';
    const text = msg.text || '';
    const icon = msg.icon || 'GameIcon4';
    const timestamp = msg.timestamp ? Number(msg.timestamp) : null;
    
    let timeFormatted = 'только что';
    if (timestamp && !isNaN(timestamp)) {
      timeFormatted = formatTimeAgo(timestamp);
    } else {
      timeFormatted = 'недавно';
    }
    
    const safeName = escapeHtml(name);
    const safeText = escapeHtml(text);
    const iconUrl = getIconUrl(icon);
    
    const row = document.createElement('div');
    row.className = 'row';
    
    const avatarDiv = document.createElement('div');
    avatarDiv.className = 'avatar';
    const img = document.createElement('img');
    img.src = iconUrl;
    img.onerror = function() {
      if (this.src !== iconUrl) return;
      this.src = "https://raw.githubusercontent.com/bahrstars/bahrstars.github.io/7078079fb0d951a18723045bb6c0d55c0ccf538c/GameFiles/Images/Icons/GameIcon4.svg";
    };
    avatarDiv.appendChild(img);
    
    const messageDiv = document.createElement('div');
    messageDiv.className = 'message';
    
    const nameDiv = document.createElement('div');
    nameDiv.className = 'name';
    nameDiv.textContent = safeName;
    
    const textDiv = document.createElement('div');
    textDiv.className = 'text';
    textDiv.textContent = safeText;
    
    const timeDiv = document.createElement('div');
    timeDiv.className = 'time';
    timeDiv.textContent = timeFormatted;
    
    messageDiv.appendChild(nameDiv);
    messageDiv.appendChild(textDiv);
    messageDiv.appendChild(timeDiv);
    
    row.appendChild(avatarDiv);
    row.appendChild(messageDiv);
    
    scrollContainer.appendChild(row);
  }
  
  if (autoScrollEnabled) {
    scrollContainer.scrollTop = scrollContainer.scrollHeight;
  }
}

scrollContainer.addEventListener('scroll', function() {
  const isAtBottom = scrollContainer.scrollHeight - scrollContainer.scrollTop - scrollContainer.clientHeight < 10;
  if (isAtBottom) {
    autoScrollEnabled = true;
  } else {
    autoScrollEnabled = false;
    if (scrollTimeout) clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      const nowAtBottom = scrollContainer.scrollHeight - scrollContainer.scrollTop - scrollContainer.clientHeight < 10;
      if (!nowAtBottom) {
        autoScrollEnabled = false;
      } else {
        autoScrollEnabled = true;
      }
    }, 300);
  }
});

let hasSentLoaded = false;

window.addEventListener('message', function(event) {
  const receivedData = event.data;
  let messagesArray = null;
  let isValidArray = false;
  
  if (Array.isArray(receivedData)) {
    messagesArray = receivedData;
    isValidArray = true;
  } 
  else if (typeof receivedData === 'string') {
    try {
      const parsed = JSON.parse(receivedData);
      if (Array.isArray(parsed)) {
        messagesArray = parsed;
        isValidArray = true;
      } else if (parsed && typeof parsed === 'object') {
        if (Array.isArray(parsed.messages)) {
          messagesArray = parsed.messages;
          isValidArray = true;
        } else if (Array.isArray(parsed.data)) {
          messagesArray = parsed.data;
          isValidArray = true;
        }
      }
    } catch(e) {}
  }
  else if (receivedData && typeof receivedData === 'object') {
    if (Array.isArray(receivedData.messages)) {
      messagesArray = receivedData.messages;
      isValidArray = true;
    } else if (Array.isArray(receivedData.data)) {
      messagesArray = receivedData.data;
      isValidArray = true;
    }
  }
  
  if (isValidArray && messagesArray !== null) {
    window.parent.postMessage(' loaded ', '*');
    hasSentLoaded = true;
    renderMessages(messagesArray);
  }
});

window.addEventListener('DOMContentLoaded', function() {
  window.parent.postMessage(' loaded ', '*');
  hasSentLoaded = true;
  renderMessages([]);
});
</script>
</body>
</html>
