<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pixel Perfect Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* Абсолютное заполнение iframe — без границ, на всю область */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: hidden;        /* убираем скролл на уровне body/html */
}

body {
  font-family: 'Rubik', sans-serif;
  background: transparent;
}

/* Чат-контейнер — занимает 100% высоты и ширины */
.chat-container {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  background: transparent;
}

/* Область прокрутки: занимает всё пространство, скролл скрыт визуально, но работает */
.chat-scrollable {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: flex-start; /* всё выравнивается к левому краю */
  scroll-behavior: smooth;
  padding: 8px 0 12px 0;
  
  /* Скрываем полосу прокрутки, но оставляем функционал */
  scrollbar-width: none;     /* Firefox */
  -ms-overflow-style: none;  /* IE/Edge */
}

.chat-scrollable::-webkit-scrollbar {
  display: none;             /* Chrome/Safari/Opera */
}

/* Строка сообщения — теперь занимает почти всю ширину, чтобы пузырь мог растягиваться */
.row { 
  display: flex; 
  align-items: flex-start; 
  margin: 5px 12px;          /* чуть уменьшили отступы между сообщениями */
  width: calc(100% - 24px);  /* ширина на всю доступную область с учётом margin */
  max-width: 100%;
}

/* Аватар фиксированного размера */
.avatar { 
  width: 34px;               /* чуть уменьшили аватар для компактности */
  height: 34px; 
  margin-right: 8px; 
  flex-shrink: 0; 
}

.avatar img { 
  width: 100%; 
  height: 100%; 
  object-fit: cover; 
  border-radius: 0; 
}

/* Пузырь сообщения — теперь растягивается на всю доступную ширину */
.message { 
  position: relative; 
  background: #1ea7e1; 
  border-radius: 18px; 
  padding: 8px 12px 10px 12px;  /* чуть уменьшили внутренние отступы (было 10px 14px 12px 14px) */
  flex: 1;                       /* занимает всё свободное пространство в row */
  max-width: 100%;               /* может расти в ширину */
  box-shadow: inset 0 -2px 0 rgba(0,0,0,0.15);
  word-wrap: break-word;
}

/* Хвост сообщения — скорректировали позицию под новый размер пузыря */
.message::before { 
  content: ""; 
  position: absolute; 
  left: -6px; 
  top: 14px;                    /* чуть подняли под новый padding */
  width: 12px; 
  height: 12px; 
  background: #1ea7e1; 
  transform: rotate(45deg); 
  border-radius: 2px; 
}

.name { 
  font-weight: 700; 
  font-size: 14px;              /* чуть уменьшили шрифт имени (было 15px) */
  color: #ffffff; 
  margin-bottom: 2px; 
  text-shadow: 0 1px 0 rgba(0,0,0,0.3); 
}

.text { 
  font-size: 15px;              /* чуть уменьшили шрифт текста (было 16px) */
  font-weight: 600; 
  color: #eaf7ff; 
  word-break: break-word;
  white-space: pre-wrap;
  line-height: 1.35;
}

.time { 
  position: absolute; 
  top: 6px;                    /* скорректировали под меньший padding */
  right: 10px; 
  font-size: 10px;             /* чуть уменьшили время (было 11px) */
  color: rgba(0,0,0,0.35); 
  font-weight: 600; 
}

/* Сообщение-заглушка при отсутствии данных */
.empty-chat {
  color: rgba(255,255,255,0.6);
  text-align: center;
  font-size: 14px;
  padding: 20px;
  width: 100%;
  box-sizing: border-box;
  font-weight: 400;
}

/* ВСЕ ОСТАЛЬНЫЕ СТИЛИ СОХРАНЯЮТ ОРИГИНАЛЬНУЮ ВИЗУАЛЬНУЮ КОНЦЕПЦИЮ */
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-scrollable" id="chatScroll">
    <div class="empty-chat" id="emptyPlaceholder">Сообщения пока не загружены</div>
  </div>
</div>

<script>
  // Элементы DOM
  const scrollContainer = document.getElementById('chatScroll');
  
  // Флаг для блокировки автоматической прокрутки, когда пользователь скроллит вручную
  let userScrolling = false;
  let scrollTimeout = null;
  
  // Отслеживаем, когда пользователь начинает скроллить вручную
  scrollContainer.addEventListener('scroll', function() {
    userScrolling = true;
    // Сбрасываем флаг через 1.5 секунды после остановки скролла
    if (scrollTimeout) clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      userScrolling = false;
    }, 1500);
  });
  
  // Функция плавной прокрутки вниз ТОЛЬКО если пользователь не скроллит вручную
  function scrollToBottomIfNeeded() {
    if (!userScrolling) {
      scrollContainer.scrollTop = scrollContainer.scrollHeight;
    }
  }
  
  // Функция форматирования времени из UNIX timestamp (секунды)
  function formatTimeAgo(timestampSeconds) {
    if (!timestampSeconds) return "только что";
    
    const now = Math.floor(Date.now() / 1000);
    const diffSeconds = now - timestampSeconds;
    
    if (diffSeconds < 0) return "только что";
    
    const minutes = Math.floor(diffSeconds / 60);
    const hours = Math.floor(diffSeconds / 3600);
    const days = Math.floor(diffSeconds / 86400);
    
    if (days >= 1) {
      const remainingHours = hours % 24;
      return `${days} д. ${remainingHours} ч. назад`;
    } else if (hours >= 1) {
      const remainingMins = minutes % 60;
      return `${hours} ч. ${remainingMins} мин. назад`;
    } else if (minutes >= 1) {
      return `${minutes} мин. назад`;
    } else {
      return `только что`;
    }
  }
  
  // Экранирование HTML
  function escapeHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
  
  // Построение URL иконки по названию icon
  function getIconUrl(iconName) {
    if (!iconName) {
      return "https://raw.githubusercontent.com/bahrstars/bahrstars.github.io/7078079fb0d951a18723045bb6c0d55c0ccf538c/GameFiles/Images/Icons/GameIcon4.svg";
    }
    const cleanName = String(iconName).replace(/\.svg$/i, '');
    return `https://raw.githubusercontent.com/bahrstars/bahrstars.github.io/5c4d2cff072d93b418887ee2dd8376a51482acdc/GameFiles/Images/Icons/${encodeURIComponent(cleanName)}.svg`;
  }
  
  // Рендер сообщений
  function renderMessages(messagesArray) {
    // Сохраняем позицию скролла и флаг активности пользователя
    const wasUserScrolling = userScrolling;
    const oldScrollHeight = scrollContainer.scrollHeight;
    const oldScrollTop = scrollContainer.scrollTop;
    const wasAtBottom = (oldScrollHeight - oldScrollTop - scrollContainer.clientHeight) < 50;
    
    // Очищаем контейнер
    while (scrollContainer.firstChild) {
      scrollContainer.removeChild(scrollContainer.firstChild);
    }
    
    // Если нет сообщений
    if (!messagesArray || messagesArray.length === 0) {
      const emptyDiv = document.createElement('div');
      emptyDiv.className = 'empty-chat';
      emptyDiv.textContent = 'Сообщения пока не загружены';
      scrollContainer.appendChild(emptyDiv);
      return;
    }
    
    // Проходим по массиву (порядок как пришёл: от старых к новым — последний элемент нижний)
    for (let i = 0; i < messagesArray.length; i++) {
      const msg = messagesArray[i];
      if (!msg || typeof msg !== 'object') continue;
      
      const name = msg.name || 'Аноним';
      const text = msg.text || '';
      const icon = msg.icon || 'GameIcon4';
      const timestamp = msg.timestamp ? Number(msg.timestamp) : null;
      
      let timeFormatted = 'только что';
      if (timestamp && !isNaN(timestamp)) {
        timeFormatted = formatTimeAgo(timestamp);
      } else {
        timeFormatted = 'недавно';
      }
      
      const safeName = escapeHtml(name);
      const safeText = escapeHtml(text);
      const iconUrl = getIconUrl(icon);
      
      const row = document.createElement('div');
      row.className = 'row';
      
      const avatarDiv = document.createElement('div');
      avatarDiv.className = 'avatar';
      const img = document.createElement('img');
      img.src = iconUrl;
      img.onerror = function() {
        if (this.src !== iconUrl) return;
        this.src = "https://raw.githubusercontent.com/bahrstars/bahrstars.github.io/7078079fb0d951a18723045bb6c0d55c0ccf538c/GameFiles/Images/Icons/GameIcon4.svg";
      };
      avatarDiv.appendChild(img);
      
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message';
      
      const nameDiv = document.createElement('div');
      nameDiv.className = 'name';
      nameDiv.textContent = safeName;
      
      const textDiv = document.createElement('div');
      textDiv.className = 'text';
      textDiv.textContent = safeText;
      
      const timeDiv = document.createElement('div');
      timeDiv.className = 'time';
      timeDiv.textContent = timeFormatted;
      
      messageDiv.appendChild(nameDiv);
      messageDiv.appendChild(textDiv);
      messageDiv.appendChild(timeDiv);
      
      row.appendChild(avatarDiv);
      row.appendChild(messageDiv);
      
      scrollContainer.appendChild(row);
    }
    
    // Умная прокрутка:
    // - Если пользователь не скроллит активно И (был внизу ИЛИ это первый рендер)
    // - Не сопротивляемся, если пользователь пытается листать вверх
    if (!wasUserScrolling) {
      // Если пользователь был внизу до обновления, прокручиваем вниз
      if (wasAtBottom || messagesArray.length < 5) {
        scrollContainer.scrollTop = scrollContainer.scrollHeight;
      } else {
        // Иначе сохраняем позицию относительно видимого контента
        const newScrollHeight = scrollContainer.scrollHeight;
        const heightDiff = newScrollHeight - oldScrollHeight;
        if (heightDiff > 0 && oldScrollTop > 0) {
          scrollContainer.scrollTop = oldScrollTop + heightDiff;
        } else {
          scrollContainer.scrollTop = oldScrollTop;
        }
      }
    } else {
      // Если пользователь скроллит вручную — сохраняем его позицию
      const newScrollHeight = scrollContainer.scrollHeight;
      const heightDiff = newScrollHeight - oldScrollHeight;
      if (heightDiff > 0 && oldScrollTop > 0) {
        scrollContainer.scrollTop = oldScrollTop + heightDiff;
      } else {
        scrollContainer.scrollTop = oldScrollTop;
      }
    }
  }
  
  let hasSentLoaded = false;
  let currentMessages = []; // храним текущие сообщения для повторного использования
  
  // Обработчик сообщений от родительского окна (игры)
  window.addEventListener('message', function(event) {
    const receivedData = event.data;
    let messagesArray = null;
    let isValidArray = false;
    
    // Определяем массив
    if (Array.isArray(receivedData)) {
      messagesArray = receivedData;
      isValidArray = true;
    } 
    else if (typeof receivedData === 'string') {
      try {
        const parsed = JSON.parse(receivedData);
        if (Array.isArray(parsed)) {
          messagesArray = parsed;
          isValidArray = true;
        } else if (parsed && typeof parsed === 'object') {
          if (Array.isArray(parsed.messages)) {
            messagesArray = parsed.messages;
            isValidArray = true;
          } else if (Array.isArray(parsed.data)) {
            messagesArray = parsed.data;
            isValidArray = true;
          }
        }
      } catch(e) {
        // не JSON — возможно, просто строка, игнорируем
      }
    }
    else if (receivedData && typeof receivedData === 'object') {
      if (Array.isArray(receivedData.messages)) {
        messagesArray = receivedData.messages;
        isValidArray = true;
      } else if (Array.isArray(receivedData.data)) {
        messagesArray = receivedData.data;
        isValidArray = true;
      }
    }
    
    if (isValidArray && messagesArray !== null) {
      // Отправляем ответ " loaded " (как в задании)
      window.parent.postMessage(' loaded ', '*');
      hasSentLoaded = true;
      
      // Сохраняем и обновляем сообщения
      currentMessages = messagesArray;
      renderMessages(messagesArray);
    }
  });
  
  // Инициализация при загрузке
  window.addEventListener('DOMContentLoaded', function() {
    window.parent.postMessage(' loaded ', '*');
    hasSentLoaded = true;
    renderMessages([]);
  });
  
  // Слушаем завершение загрузки изображений, чтобы скорректировать скролл (чтобы не было скачков)
  // Используем MutationObserver для отслеживания добавления картинок
  const observer = new MutationObserver(function(mutations) {
    let needScrollCheck = false;
    mutations.forEach(function(mutation) {
      if (mutation.type === 'childList' && mutation.addedNodes.length) {
        mutation.addedNodes.forEach(function(node) {
          if (node.nodeName === 'IMG' || (node.querySelector && node.querySelector('img'))) {
            needScrollCheck = true;
          }
        });
      }
    });
    if (needScrollCheck && !userScrolling) {
      // Небольшая задержка для загрузки картинок
      setTimeout(() => {
        if (!userScrolling) {
          const isAtBottom = (scrollContainer.scrollHeight - scrollContainer.scrollTop - scrollContainer.clientHeight) < 50;
          if (isAtBottom) {
            scrollContainer.scrollTop = scrollContainer.scrollHeight;
          }
        }
      }, 100);
    }
  });
  
  observer.observe(scrollContainer, { childList: true, subtree: true });
</script>
</body>
</html>
