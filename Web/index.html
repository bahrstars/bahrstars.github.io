<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brawl Stars — Главное меню</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Lilita One', 'Impact', sans-serif;
            background: #0b2b3b;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: url('https://raw.githubusercontent.com/bahrstars/bahr-stars-web/refs/heads/main/assets/mina_lobby.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .game-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
            z-index: 0;
        }

        /* ========= ВЕРХНЯЯ ПАНЕЛЬ (УМЕНЬШЕННАЯ) ========= */
        .top-bar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            gap: 8px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
        }

        .left-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 4px 12px 4px 4px;
            border-radius: 40px;
            border: 1px solid rgba(255,200,50,0.6);
        }

        .avatar {
            width: 38px;
            height: 38px;
            background: #f5b642;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid white;
        }

        .exp-info {
            display: flex;
            flex-direction: column;
        }

        .exp-info span:first-child {
            font-size: 10px;
            font-weight: bold;
            color: #ffd966;
        }

        .exp-bar {
            width: 60px;
            height: 6px;
            background: #2c3e2f;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 2px;
        }

        .exp-fill {
            width: 45%;
            height: 100%;
            background: #ffc107;
            border-radius: 10px;
        }

        .trophy-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 14px;
            color: #ffd966;
            border: 1px solid rgba(255,200,50,0.5);
        }

        .trophy-badge img {
            width: 20px;
            height: 20px;
        }

        .resources {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .resource-item {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            font-size: 12px;
            color: white;
            text-shadow: 0 1px 2px black;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .resource-item img {
            width: 18px;
            height: 18px;
        }

        /* ========= ЦЕНТРАЛЬНЫЙ ПЕРСОНАЖ ========= */
        .hero-area {
            position: relative;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            min-height: 0;
            pointer-events: none;
            margin-top: -20px;
        }

        .hero-img {
            max-width: 70%;
            max-height: 55vh;
            width: auto;
            height: auto;
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.4));
            object-fit: contain;
        }

        /* ========= КНОПКА BRAWL PASS (УВЕЛИЧЕНА) ========= */
        .pass-button {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 25;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .pass-button img {
            height: 85px;
            width: auto;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.5));
        }
        .pass-button:active {
            transform: scale(0.94);
        }

        /* ========= НИЖНЕЕ МЕНЮ (СПРАВА НАЛЕВО: ИГРАТЬ, БОЙЦЫ, МАГАЗИН, НОВОСТИ) ========= */
        .bottom-nav {
            position: relative;
            z-index: 20;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 12px 20px 25px;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
        }

        .nav-btn {
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.1s ease;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-btn img {
            height: clamp(52px, 11vw, 70px);
            width: auto;
            display: block;
            filter: drop-shadow(0 6px 6px rgba(0,0,0,0.4));
        }

        .nav-btn:active {
            transform: scale(0.94);
        }

        /* порядок кнопок через flex order */
        .nav-btn[data-action="play"] { order: 4; }
        .nav-btn[data-action="brawlers"] { order: 3; }
        .nav-btn[data-action="shop"] { order: 2; }
        .nav-btn[data-action="news"] { order: 1; }

        /* ========= УВЕДОМЛЕНИЕ (ПЛАВНОЕ, БЕЗ ЗАДНИКА) ========= */
        .notification {
            position: fixed;
            left: 50%;
            top: 40%;
            transform: translateX(-50%) translateY(0);
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
            text-align: center;
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.3s ease;
            white-space: nowrap;
            background: transparent;
            backdrop-filter: none;
            padding: 8px 20px;
            border-radius: 60px;
        }
        .notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-30px);
        }

        @media (max-width: 600px) {
            .resource-item span { font-size: 10px; }
            .resource-item img { width: 14px; height: 14px; }
            .trophy-badge { font-size: 12px; padding: 3px 8px; }
            .trophy-badge img { width: 16px; height: 16px; }
            .avatar { width: 32px; height: 32px; font-size: 20px; }
            .exp-bar { width: 50px; }
            .pass-button img { height: 70px; }
            .notification { font-size: 18px; white-space: nowrap; top: 35%; }
        }
        @media (max-width: 480px) {
            .top-bar { flex-wrap: wrap; justify-content: center; gap: 6px; }
            .resources { justify-content: center; }
            .notification { font-size: 16px; white-space: nowrap; top: 30%; }
            .nav-btn img { height: 48px; }
            .bottom-nav { gap: 8px; padding: 8px 12px 20px; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <!-- ВЕРХНЯЯ ПАНЕЛЬ (УМЕНЬШЕНА) -->
    <div class="top-bar">
        <div style="display: flex; gap: 8px; align-items: center;">
            <div class="left-profile">
                <div class="avatar">⭐</div>
                <div class="exp-info">
                    <span>УРОВЕНЬ 12</span>
                    <div class="exp-bar"><div class="exp-fill"></div></div>
                </div>
            </div>
            <div class="trophy-badge">
                <img src="https://raw.githubusercontent.com/bahrstars/bahr-stars-web/refs/heads/main/assets/icons/Trophy.png" alt="🏆"> <span id="trophyCount">1250</span>
            </div>
        </div>
        <div class="resources">
            <div class="resource-item"><img src="https://raw.githubusercontent.com/bahrstars/bahr-stars-web/refs/heads/main/assets/icons/Coins_icon.png" alt="монеты"><span id="coinCount">2450</span></div>
            <div class="resource-item"><img src="https://raw.githubusercontent.com/bahrstars/bahr-stars-web/refs/heads/main/assets/icons/Gems_icon%20(2).png" alt="гемы"><span id="gemCount">89</span></div>
            <div class="resource-item"><img src="https://raw.githubusercontent.com/bahrstars/bahr-stars-web/refs/heads/main/assets/icons/Power%20Points_icon.png" alt="очки силы"><span id="powerPoints">340</span></div>
            <div class="resource-item"><img src="https://raw.githubusercontent.com/bahrstars/bahr-stars-web/refs/heads/main/assets/icons/Blings_icon.png" alt="блинги"><span id="blingCount">520</span></div>
        </div>
    </div>

    <!-- ЦЕНТРАЛЬНЫЙ ПЕРСОНАЖ -->
    <div class="hero-area">
        <img class="hero-img" src="https://raw.githubusercontent.com/bahrstars/bahr-stars-web/refs/heads/main/assets/mina_high_scorer_mina.png" alt="Mina">
    </div>

    <!-- Brawl Pass (увеличен) -->
    <button class="pass-button" id="brawlPassBtn">
        <img src="https://raw.githubusercontent.com/bahrstars/bahr-stars-web/refs/heads/main/assets/ui/Pass%20(1).png" alt="Brawl Pass">
    </button>

    <!-- НИЖНЕЕ МЕНЮ (справа налево: Играть, Бойцы, Магазин, Новости) -->
    <div class="bottom-nav">
        <button class="nav-btn" data-action="play">
            <img src="https://raw.githubusercontent.com/bahrstars/bahr-stars-web/refs/heads/main/assets/ui/Brawl.png" alt="Играть">
        </button>
        <button class="nav-btn" data-action="brawlers">
            <img src="https://raw.githubusercontent.com/bahrstars/bahr-stars-web/refs/heads/main/assets/ui/Brawlers2.png" alt="Бойцы">
        </button>
        <button class="nav-btn" data-action="shop">
            <img src="https://raw.githubusercontent.com/bahrstars/bahr-stars-web/refs/heads/main/assets/ui/Shop3.png" alt="Магазин">
        </button>
        <button class="nav-btn" data-action="news">
            <img src="https://raw.githubusercontent.com/bahrstars/bahr-stars-web/refs/heads/main/assets/ui/News.png" alt="Новости">
        </button>
    </div>
</div>

<!-- Элемент уведомления -->
<div id="notification" class="notification"></div>

<script>
    (function() {
        // ---------- ИГРОВЫЕ ДАННЫЕ ----------
        let playerData = {
            trophies: 1250,
            coins: 2450,
            gems: 89,
            powerPoints: 340,
            bling: 520,
            level: 12,
            exp: 45
        };

        function loadData() {
            const saved = localStorage.getItem('brawl_simulator_data');
            if(saved) {
                try {
                    const data = JSON.parse(saved);
                    playerData = { ...playerData, ...data };
                } catch(e) {}
            }
            updateUI();
        }

        function saveData() {
            localStorage.setItem('brawl_simulator_data', JSON.stringify(playerData));
        }

        function updateUI() {
            document.getElementById('trophyCount').innerText = playerData.trophies;
            document.getElementById('coinCount').innerText = playerData.coins;
            document.getElementById('gemCount').innerText = playerData.gems;
            document.getElementById('powerPoints').innerText = playerData.powerPoints;
            document.getElementById('blingCount').innerText = playerData.bling;
            const expFill = document.querySelector('.exp-fill');
            if(expFill) expFill.style.width = `${Math.min(100, playerData.exp)}%`;
        }

        // ---------- АУДИО ----------
        let bgMusic = null;
        let audioEnabled = false;
        let tapSound = null;

        function initAudio() {
            if(bgMusic) return;
            bgMusic = new Audio('https://github.com/bahrstars/bahr-stars-web/raw/refs/heads/main/assets/audio/music/StarrPark.mp3');
            bgMusic.loop = true;
            bgMusic.volume = 0.5;
            tapSound = new Audio('https://github.com/bahrstars/bahr-stars-web/raw/refs/heads/main/assets/audio/Tap.wav');
            tapSound.volume = 0.6;
        }

        function playTap() {
            if(!audioEnabled) return;
            if(tapSound) {
                tapSound.currentTime = 0;
                tapSound.play().catch(e => console.log("tap sound blocked"));
            }
        }

        function enableAudioAndPlay() {
            if(!audioEnabled && bgMusic) {
                bgMusic.play().then(() => {
                    audioEnabled = true;
                }).catch(e => console.log('audio autoplay blocked'));
            }
        }

        // ---------- УВЕДОМЛЕНИЕ (ПЛАВНОЕ) ----------
        let notificationTimeout = null;
        function showMessage(text) {
            const notif = document.getElementById('notification');
            if(notificationTimeout) clearTimeout(notificationTimeout);
            notif.innerText = text;
            notif.classList.remove('show');
            void notif.offsetWidth; // рефлоу
            notif.classList.add('show');
            notificationTimeout = setTimeout(() => {
                notif.classList.remove('show');
            }, 1800);
        }

        // ---------- ОТКРЫТИЕ STARR DROP (отдельная страница) ----------
        function openStarrDrop() {
            playTap();
            // сохраняем данные перед переходом
            saveData();
            // переходим на страницу дропа, передаём данные через sessionStorage
            sessionStorage.setItem('brawl_return_data', JSON.stringify(playerData));
            window.location.href = 'starr_drop.html';
        }

        // ---------- ДРУГИЕ КНОПКИ ----------
        function handleShop() {
            playTap();
            showMessage('🛒 МАГАЗИН: скоро здесь появятся наборы');
        }
        function handleBrawlers() {
            playTap();
            showMessage('🤠 КОЛЛЕКЦИЯ: 18/78 бойцов');
        }
        function handleNews() {
            playTap();
            showMessage('📰 НОВОСТИ: Ивент "Звёздная буря" начался!');
        }
        function handleBrawlPass() {
            playTap();
            showMessage('🎫 BRAWL PASS: +100 очков силы');
            playerData.powerPoints += 100;
            playerData.gems += 5;
            saveData();
            updateUI();
        }

        // назначение обработчиков
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const action = btn.getAttribute('data-action');
                if(action === 'play') openStarrDrop();
                else if(action === 'shop') handleShop();
                else if(action === 'brawlers') handleBrawlers();
                else if(action === 'news') handleNews();
                if(!audioEnabled && bgMusic) bgMusic.play().catch(()=>{});
            });
        });

        document.getElementById('brawlPassBtn').addEventListener('click', () => {
            handleBrawlPass();
            if(!audioEnabled && bgMusic) bgMusic.play().catch(()=>{});
        });

        // глобальное включение аудио
        function globalEnableAudio() {
            if(!bgMusic) initAudio();
            if(bgMusic && !audioEnabled) {
                bgMusic.play().then(() => audioEnabled = true).catch(()=>{});
            }
            document.removeEventListener('touchstart', globalEnableAudio);
            document.removeEventListener('click', globalEnableAudio);
        }

        loadData();
        initAudio();
        document.addEventListener('touchstart', globalEnableAudio);
        document.addEventListener('click', globalEnableAudio);
        setTimeout(() => {
            if(bgMusic && !audioEnabled) bgMusic.play().catch(()=>{});
        }, 500);
    })();
</script>
</body>
</html>
